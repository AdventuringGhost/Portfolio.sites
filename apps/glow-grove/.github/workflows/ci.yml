name: Glow Grove CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/glow-grove/package-lock.json
    
    - name: Install dependencies
      run: |
        cd apps/glow-grove
        npm ci
    
    - name: Run tests
      run: |
        cd apps/glow-grove
        npm test
    
    - name: Build application
      run: |
        cd apps/glow-grove
        npm run build
    
    - name: Build Docker image
      run: |
        cd apps/glow-grove
        docker build -t glow-grove:latest .
    
    # TODO: Expand with deployment steps
