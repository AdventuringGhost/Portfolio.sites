name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Test static export
        run: npm run export

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "Build output directory 'out' not found"
            exit 1
          fi
          if [ ! -f "out/index.html" ]; then
            echo "index.html not found in build output"
            exit 1
          fi
          echo "Build verification successful"
          ls -la out/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: out/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: out/

      - name: Configure AWS credentials
        # TODO: Uncomment and configure with your AWS credentials
        # uses: aws-actions/configure-aws-credentials@v4
        # with:
        #   aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        #   aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        #   aws-region: us-east-1

      - name: Deploy to S3
        # TODO: Uncomment and configure with your S3 bucket name
        # run: aws s3 sync out/ s3://your-bucket-name/ --delete
        run: echo "S3 deployment would happen here with proper AWS credentials"

      - name: Invalidate CloudFront cache
        # TODO: Uncomment and configure with your CloudFront distribution ID
        # run: aws cloudfront create-invalidation --distribution-id YOUR_DISTRIBUTION_ID --paths "/*"
        run: echo "CloudFront invalidation would happen here with proper AWS credentials"
